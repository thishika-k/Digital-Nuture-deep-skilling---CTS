<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Student Directory</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <header>

    <h1>Student Directory</h1>

    <div class="controls">

        <input
            type="text"
            id="searchBox"
            placeholder="Search Student...">

        <button id="loadStudents">
            Load Students
        </button>

        <button id="refreshStudents">
            Refresh
        </button>

    </div>

</header>

    <main>

        <section class="summary">

            <div class="card">

                <h2 id="studentCount">0</h2>

                <p>Total Students</p>

            </div>

        </section>

        <section>

            <h2>Students</h2>

            <div id="studentContainer"
                 class="student-grid">

            </div>

        </section>

    </main>

    <script src="app.js"></script>

</body>

</html>
