<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <h1>Student Portal Dashboard</h1>

        <div class="controls">

            <input
                type="text"
                id="searchBox"
                placeholder="Search Courses...">

            <select id="sortCourses">

                <option value="default">Sort Courses</option>

                <option value="asc">A-Z</option>

                <option value="desc">Z-A</option>

            </select>

        </div>

    </header>

    <main>

        <section class="dashboard">

            <div class="summary-card">
                <h2 id="totalCourses">0</h2>
                <p>Total Courses</p>
            </div>

            <div class="summary-card">
                <h2 id="totalCredits">0</h2>
                <p>Total Credits</p>
            </div>

            <div class="summary-card">
                <h2 id="highestCredits">0</h2>
                <p>Highest Credit</p>
            </div>

        </section>

        <section>

            <h2>Available Courses</h2>

            <div id="courseContainer" class="course-grid">

            </div>

        </section>

    </main>

    <script type="module" src="app.js"></script>

</body>

</html>
